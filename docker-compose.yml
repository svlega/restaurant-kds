services:
  # ── API + Dashboard server ──────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_RESTAURANT_NAME: ${RESTAURANT_NAME:-Restaurant}
    container_name: kds-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Europe/Paris
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      FB_TOKEN: ${FB_TOKEN}
      PHONE_NUMBER_ID: ${PHONE_NUMBER_ID}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      COMMENTS_FLOW_ID: ${COMMENTS_FLOW_ID}
      WEBHOOK_VERIFY_TOKEN: ${WEBHOOK_VERIFY_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      RESTAURANT_NAME: ${RESTAURANT_NAME:-Restaurant}
    volumes:
      # Persist SQLite DB, orders JSON, and logs between container restarts
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx reverse proxy (handles SSL termination) ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: kds-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      server:
        condition: service_healthy

  # ── Certbot for Let's Encrypt SSL ────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: kds-certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Run once manually: docker compose run certbot certonly --webroot ...
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  certbot-webroot:
